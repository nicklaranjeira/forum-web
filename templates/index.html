<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fórum WEB</title>
    <link rel="stylesheet" href="{{ url_for('static', path='css/style.css') }}">
</head>
<body>

    <h1>Fórum WEB 💬</h1>

    <ul class="feed">
        {% for post in posts %}
        <li class="post-card">
            <div class="post-card__header">
                <div>
                    {{post.id}}
                    <h3 class="post-card__title">{{ post.titulo }}</h3>
                    <p class="post-card__author">Autor: {{ post.autor }}</p>
                </div>
            </div>

            <p class="post-card__summary">Resumo: {{ post.resumo }}</p>
            <div class="post-card__content">
                <p>Conteúdo: {{ post.conteudo }}</p>
            </div>
        </li>
        {% endfor %}
    </ul>

    <button type="button">
        <a href="/create">Adicionar post</a>
    </button>

    <button type="button">
        <a href="/edit">Editar um post</a>
    </button>

    <button type="button">
        <a href="/delete">Deletar um post</a>
    </button>

</body>
</html>
