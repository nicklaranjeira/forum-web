<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fórum WEB</title>
    <link rel="stylesheet" href="{{ url_for('static', path='css/style.css') }}">
</head>
<body>


    <h1>Fórum WEB 💬</h1>
        <ul>{% for post in posts %}
            <p>Título: {{ post.titulo }}</p>
            <p>Resumo: {{post.resumo}}</p>
            <p>Conteudo: {{post.conteudo}}</p>
            <p>Autor: {{post.autor}}</p>

        {% endfor %}
        </ul>
    
    <button type="button">  
        <a href="/create">Adicionar post</a> 
    </button>

    <button type="button">
        <a href="/edit">Editar um post</a>
    </button>

    <button type="button">
        <a href="/delete">Deletar um post</a>
    </button>


</body>
</html>
